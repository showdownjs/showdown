<p>A naked checkbox outside any list stays raw HTML:</p>
<p><input type="checkbox"> not a task</p>
<p>An inline checkbox in flowing text also stays raw: toggle <input type="checkbox" checked> here</p>
<div><input type="checkbox"> inside a div, still raw</div>
<p>Only a checkbox inside a list item becomes a task marker:</p>
<ul>
<li><input disabled type="checkbox"> open task</li>
<li><input checked disabled type="checkbox"> done task</li>
</ul>
